name: CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List module files (debug)
        run: |
          echo "PWD: $(pwd)"
          echo "Listing repository root:"; ls -la . || true
          echo "Listing cwk1:"; ls -la cwk1 || true
          if [ -f cwk1/go.sum ]; then
            echo "cwk1/go.sum exists (first 10 lines):"; head -n 10 cwk1/go.sum || true
          else
            echo "cwk1/go.sum NOT FOUND"
          fi

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install system deps for sqlite (required by github runners)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev

      - name: Prepare Go modules
        run: cd cwk1 && go mod tidy

      - name: Install golangci-lint
        run: |
          GO111MODULE=on go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0
          echo "golangci-lint installed"

      - name: Run linter (golangci-lint)
        run: cd cwk1 && golangci-lint run --config .golangci.yml ./...

      - name: Run vet
        run: cd cwk1 && go vet ./...

      - name: Build
        run: cd cwk1 && go build ./...

      - name: Run tests (with coverage, excluding integration)
        run: |
          cd cwk1
          PKGS=$(go list ./... | grep -v '/integration')
          echo "Testing packages: $PKGS"
          go test $PKGS -v -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cwk1/coverage.out

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack with docker compose
        run: cd cwk1 && docker compose up -d --build

      - name: Wait for health check (with diagnostics)
        run: |
          set -e
          # wait up to 120s, printing status and compose ps while waiting
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "healthy"
              exit 0
            fi
            echo "waiting for service... ($i/60)"
            docker compose ps || true
            sleep 2
          done
          echo "service did not start in time; dumping docker-compose status and logs"
          docker compose ps || true
          docker compose logs --no-color --tail=200 || true
          exit 1

      - name: Run integration tests
        run: cd cwk1 && go test ./integration -v

      - name: Tear down
        run: cd cwk1 && docker compose down
