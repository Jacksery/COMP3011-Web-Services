name: CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('cwk1/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install system deps for sqlite (required by github runners)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev

      - name: Run vet
        working-directory: cwk1
        run: go vet ./...

      - name: Build
        working-directory: cwk1
        run: go build ./...

      - name: Run tests (with coverage)
        working-directory: cwk1
        run: go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cwk1/coverage.out
