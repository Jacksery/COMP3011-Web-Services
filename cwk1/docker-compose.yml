version: "3.8"

services:
  init-db:
    image: alpine:3.19
    entrypoint: ["sh", "-c"]
    # Mount the host ./data directory at /work. We check for errors (e.g. if ./data is a file)
    command: "if [ -e /work ] && [ ! -d /work ]; then echo '/work exists and is not a directory; remove or rename the host ./data file and create a directory' >&2; exit 1; fi && mkdir -p /work && if [ -f /work/retailDB.sqlite ]; then chown 1000:1000 /work/retailDB.sqlite || true; chmod 660 /work/retailDB.sqlite || true; else touch /work/retailDB.sqlite && chown 1000:1000 /work/retailDB.sqlite && chmod 660 /work/retailDB.sqlite; fi"
    volumes:
      - ./data:/work
    restart: "no"

  app:
    build: .
    image: retaildb-service:latest
    depends_on:
      - init-db
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./openapi.yaml:/app/openapi.yaml:ro
    environment:
      - PORT=8080
      - RETAILDB_PATH=/app/data/retailDB.sqlite
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password
      - JWT_SECRET=changeme
    restart: unless-stopped
