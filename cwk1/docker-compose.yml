version: "3.8"

services:
  init-db:
    image: alpine:3.19
    entrypoint: ["sh", "-c"]
    command: "mkdir -p /work/data && if [ -f /work/data/retailDB.sqlite ]; then chown 1000:1000 /work/data/retailDB.sqlite || true; chmod 660 /work/data/retailDB.sqlite || true; else touch /work/data/retailDB.sqlite && chown 1000:1000 /work/data/retailDB.sqlite && chmod 660 /work/data/retailDB.sqlite; fi"
    volumes:
      - ./data:/work/data
    restart: "no"

  app:
    build: .
    image: retaildb-service:latest
    depends_on:
      - init-db
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./openapi.yaml:/app/openapi.yaml:ro
    environment:
      - PORT=8080
      - RETAILDB_PATH=/app/data/retailDB.sqlite
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password
      - JWT_SECRET=changeme
    restart: unless-stopped
