version: "3.8"

services:
  init-db:
    image: alpine:3.19
    # Run a small script that ensures /work is a directory, copies an existing DB from repo root if present, and sets ownership
    command: ["sh", "/work/scripts/init-db.sh"]
    volumes:
      - ./data:/work
      - ./scripts:/work/scripts:ro
      - ./:/src:ro
    restart: "no"

  app:
    build: .
    image: retaildb-service:latest
    depends_on:
      - init-db
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./openapi.yaml:/app/openapi.yaml:ro
    env_file:
      - .env
    environment:
      - PORT=8080
      - RETAILDB_PATH=/app/data/retailDB.sqlite
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password
      - JWT_SECRET=changeme
    restart: unless-stopped
